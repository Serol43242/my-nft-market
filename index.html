<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitTon NFT Market</title>
    
    <!-- ВАЖНО: Правильный путь к Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2f 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(30, 35, 50, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #8899bb;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #aabbdd;
            font-size: 14px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(20, 25, 40, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #0088cc;
            background: rgba(30, 35, 50, 0.9);
        }
        
        input::placeholder {
            color: #556677;
        }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
            margin-bottom: 12px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: #aabbdd;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .features {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .feature {
            padding: 12px 5px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            font-size: 12px;
            color: #99aacc;
        }
        
        .feature span {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .warning {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.2);
            border-radius: 12px;
            color: #ffaaaa;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        
        .warning.show {
            display: block;
        }
        
        .success-message {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .checkmark {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #00cc88;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="card" id="registerCard">
        <div class="logo">
            <div class="logo-icon">NFT</div>
            <h1>OrbitTon</h1>
            <div class="subtitle">Первый NFT маркет в Telegram</div>
        </div>
        
        <div class="input-group">
            <label>👤 Придумай никнейм</label>
            <input type="text" id="login" placeholder="Например: CryptoKing" maxlength="20">
        </div>
        
        <button class="btn-primary" onclick="handleAuth()">
            🚀 Начать торговлю
        </button>
        
        <button class="btn-secondary" onclick="window.Telegram.WebApp.close()">
            ✖️ Закрыть
        </button>
        
        <div class="features">
            <div class="feature"><span>🛡️</span>Безопасно</div>
            <div class="feature"><span>⚡</span>Быстро</div>
            <div class="feature"><span>💎</span>NFT</div>
        </div>
        
        <div class="warning" id="warning">
            ⚠️ Ошибка: никнейм должен содержать минимум 3 символа
        </div>
    </div>
    
    <div class="card success-message" id="successCard">
        <div class="checkmark">✓</div>
        <h2>Регистрация успешна!</h2>
        <p style="margin: 15px 0; color: #aabbdd;">Данные отправлены в бот</p>
        <div style="font-size: 12px; color: #8899bb;">Закрываю приложение...</div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Говорим Telegram, что приложение готово
        tg.ready();
        
        // Растягиваем на весь экран
        tg.expand();
        
        // Настраиваем цвета под тему Telegram
        tg.setHeaderColor('#0a0f1e');
        tg.setBackgroundColor('#0a0f1e');
        
        // Делаем основную кнопку (она появится внизу в Telegram)
        tg.MainButton.setText('Подтвердить');
        tg.MainButton.hide(); // Прячем пока что
        
        function showWarning(message) {
            const warning = document.getElementById('warning');
            warning.textContent = message;
            warning.classList.add('show');
            setTimeout(() => warning.classList.remove('show'), 3000);
        }
        
        function handleAuth() {
            const login = document.getElementById('login').value.trim();
            
            // Валидация
            if (login.length < 3) {
                showWarning('⚠️ Никнейм должен содержать минимум 3 символа');
                return;
            }
            
            if (login.length > 20) {
                showWarning('⚠️ Никнейм слишком длинный (максимум 20 символов)');
                return;
            }
            
            // Проверяем, можно ли отправлять данные
            if (!tg.sendData) {
                showWarning('❌ Ошибка: открой приложение через кнопку в чате!');
                return;
            }
            
            // Подготавливаем данные
            const userData = {
                nickname: login,
                user_id: tg.initDataUnsafe?.user?.id || 0,
                timestamp: Date.now()
            };
            
            try {
                // Отправляем данные боту
                tg.sendData(JSON.stringify(userData));
                
                // Показываем успех
                document.getElementById('registerCard').style.display = 'none';
                document.getElementById('successCard').classList.add('show');
                
                // Закрываем через 2 секунды
                setTimeout(() => tg.close(), 2000);
                
            } catch (error) {
                showWarning('❌ Ошибка отправки: ' + error.message);
            }
        }
        
        // Обработка нажатия Enter в поле ввода
        document.getElementById('login').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
        
        // Получаем информацию о пользователе из Telegram
        const user = tg.initDataUnsafe?.user;
        if (user?.first_name) {
            document.getElementById('login').placeholder = user.first_name;
        }
        
        console.log('Web App загружен, версия Telegram:', tg.version);
    </script>
</body>
</html>
