<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Registration</title>
    <!-- Подключаем скрипт Телеграма -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 300px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 { margin-bottom: 10px; font-size: 24px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-reg {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-reg:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Welcome</h2>
        <p>Создай свой профиль в Market</p>
        
        <input type="text" id="username" placeholder="Придумай никнейм">
        <button class="btn-reg" onclick="sendData()">Зарегистрироваться</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp; // Инициализация WebApp
        tg.expand(); // Развернуть на весь экран

        function sendData() {
            let user = document.getElementById("username").value;
            if (user.length < 3) {
                alert("Ник слишком короткий!");
                return;
            }
            
            // Отправляем данные обратно в бота
            let data = {
                nickname: user
            };
            tg.sendData(JSON.stringify(data)); 
            tg.close(); // Закрываем Mini App после регистрации
        }
    </script>
</body>
</html>
