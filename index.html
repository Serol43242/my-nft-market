<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitTon</title>
    
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 300px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 { 
            margin: 0 0 10px 0; 
            background: linear-gradient(45deg, #0088cc, #00eeff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }

        .btn-reg {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reg:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h2>OrbitTon</h2>
        <p>Создай профиль в маркете</p>
        
        <input type="text" id="username" placeholder="Ваш никнейм">
        <button class="btn-reg" onclick="registerUser()">Зарегистрироваться</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function registerUser() {
            const nameInput = document.getElementById("username");
            const nickname = nameInput.value.trim();

            if (nickname.length < 3) {
                tg.showAlert("Ник слишком короткий!");
                return;
            }

            const data = { nickname: nickname };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
