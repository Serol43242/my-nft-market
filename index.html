<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitTon Market</title>
    
    <!-- ИСПРАВЛЕНО: Правильный путь к скрипту Telegram -->
    <script src="https://telegram.org"></script>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 24px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            border: 1px solid #333;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
        }
        .btn-reg {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #00aaff;">OrbitTon</h2>
        <p>Регистрация</p>
        <input type="text" id="login" placeholder="Придумайте логин">
        <button class="btn-reg" onclick="handleAuth()">Зарегистрироваться</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function handleAuth() {
        const login = document.getElementById("login").value.trim();

        if (login.length < 3) {
            tg.showAlert("Логин слишком короткий!");
            return;
        }

        const data = JSON.stringify({ 
            nickname: login 
        });

        // ПРОВЕРКА: sendData работает только при открытии через Reply-кнопку
        if (tg.sendData) {
            tg.sendData(data); // Отправляет данные боту и закрывает окно
        } else {
            tg.showAlert("Ошибка: Открой приложение через кнопку в чате (не через меню), чтобы данные отправились!");
        }
    }
</script>
</body>
</html>
