<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitTon NFT Market</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2f 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(30, 35, 50, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #8899bb;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #aabbdd;
            font-size: 14px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(20, 25, 40, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #0088cc;
            background: rgba(30, 35, 50, 0.9);
        }
        
        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
            margin-bottom: 12px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.4);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            margin-top: 25px;
        }
        
        .feature {
            padding: 12px 5px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            font-size: 12px;
            color: #99aacc;
        }
        
        .feature span {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .warning {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.2);
            border-radius: 12px;
            color: #ffaaaa;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        
        .warning.show {
            display: block;
        }
        
        .success-message {
            text-align: center;
            padding: 30px 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .checkmark {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #00cc88;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: white;
            animation: scaleIn 0.5s ease;
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .success-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00cc88;
        }
        
        .success-subtext {
            color: #aabbdd;
            margin-bottom: 30px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Карточка регистрации -->
        <div class="card" id="registerCard">
            <div class="logo">
                <div class="logo-icon">🎨</div>
                <h1>OrbitTon</h1>
                <div class="subtitle">Первый NFT маркет в Telegram</div>
            </div>
            
            <div class="input-group">
                <label>👤 Придумай никнейм</label>
                <input type="text" id="login" placeholder="Например: CryptoKing" maxlength="20" autocomplete="off">
            </div>
            
            <button class="btn-primary" id="registerBtn" onclick="handleAuth()">
                🚀 Войти в маркет
            </button>
            
            <div class="features">
                <div class="feature"><span>🛡️</span>Безопасно</div>
                <div class="feature"><span>⚡</span>Мгновенно</div>
                <div class="feature"><span>💎</span>NFT</div>
            </div>
            
            <div class="warning" id="warning"></div>
        </div>
        
        <!-- Карточка успеха (показывается после отправки) -->
        <div class="card success-message" id="successCard">
            <div class="checkmark">✓</div>
            <div class="success-text">Успешно!</div>
            <div class="success-subtext" id="successText">Данные отправлены</div>
            <div style="margin-top: 20px; color: #8899bb; font-size: 14px;">
                <span class="loading"></span> Ожидаем ответ от бота...
            </div>
        </div>
        
        <!-- Карточка маркета (появится после регистрации) -->
        <div class="card hidden" id="marketCard">
            <div style="text-align: center; margin-bottom: 20px;">
                <span style="font-size: 50px;">🖼️</span>
                <h2 style="margin: 10px 0;">NFT Маркет</h2>
                <p style="color: #8899bb;">Добро пожаловать!</p>
            </div>
            
            <div style="background: rgba(0,136,204,0.1); border-radius: 16px; padding: 15px; margin-bottom: 15px;">
                <div style="display: flex; align-items: center; margin-bottom: 10px;">
                    <span style="font-size: 24px; margin-right: 10px;">👤</span>
                    <div>
                        <div style="font-size: 12px; color: #8899bb;">Твой ник</div>
                        <div style="font-weight: bold;" id="displayNickname">Загрузка...</div>
                    </div>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; text-align: center;">
                    <span style="font-size: 24px;">💰</span>
                    <div style="font-size: 12px; color: #8899bb;">Баланс</div>
                    <div style="font-weight: bold;">0 TON</div>
                </div>
                <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; text-align: center;">
                    <span style="font-size: 24px;">🖼️</span>
                    <div style="font-size: 12px; color: #8899bb;">NFT</div>
                    <div style="font-weight: bold;">0</div>
                </div>
            </div>
            
            <button class="btn-primary" onclick="window.Telegram.WebApp.close()">
                ✖️ Закрыть
            </button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // Говорим Telegram, что приложение готово
        tg.ready();
        
        // Растягиваем на весь экран
        tg.expand();
        
        // Настраиваем цвета
        tg.setHeaderColor('#0a0f1e');
        tg.setBackgroundColor('#0a0f1e');
        
        // Показываем основную кнопку (она появится внизу)
        tg.MainButton.setText('Подтвердить');
        tg.MainButton.hide();
        
        // Переменные
        let isRegistered = false;
        
        // Функция показа предупреждения
        function showWarning(message) {
            const warning = document.getElementById('warning');
            warning.textContent = message;
            warning.classList.add('show');
            setTimeout(() => warning.classList.remove('show'), 3000);
        }
        
        // Функция обработки регистрации
        function handleAuth() {
            const loginInput = document.getElementById('login');
            const login = loginInput.value.trim();
            const registerBtn = document.getElementById('registerBtn');
            
            // Валидация
            if (login.length < 3) {
                showWarning('⚠️ Никнейм должен содержать минимум 3 символа');
                loginInput.focus();
                return;
            }
            
            if (login.length > 20) {
                showWarning('⚠️ Никнейм слишком длинный (максимум 20 символов)');
                loginInput.focus();
                return;
            }
            
            // Блокируем кнопку на время отправки
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading"></span> Отправка...';
            
            // Проверяем, можно ли отправлять данные
            if (!tg.sendData) {
                showWarning('❌ Ошибка: открой приложение через кнопку в чате!');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 Войти в маркет';
                return;
            }
            
            // Подготавливаем данные
            const userData = {
                nickname: login,
                action: 'register',
                user_id: tg.initDataUnsafe?.user?.id || 0,
                timestamp: Date.now()
            };
            
            try {
                // Отправляем данные боту (это закроет WebApp, но мы покажем успех)
                tg.sendData(JSON.stringify(userData));
                
                // Показываем экран успеха
                document.getElementById('registerCard').style.display = 'none';
                document.getElementById('successCard').classList.add('show');
                document.getElementById('successText').innerHTML = `Никнейм <b>${login}</b> отправлен!`;
                
                // Сохраняем никнейм
                localStorage.setItem('userNickname', login);
                
                // Через 3 секунды покажем маркет (если WebApp еще открыт)
                setTimeout(() => {
                    if (window.Telegram.WebApp.isExpanded) {
                        showMarket(login);
                    }
                }, 3000);
                
            } catch (error) {
                showWarning('❌ Ошибка отправки: ' + error.message);
                registerBtn.disabled = false;
                registerBtn.innerHTML = '🚀 Войти в маркет';
            }
        }
        
        // Функция показа маркета
        function showMarket(nickname) {
            document.getElementById('successCard').classList.remove('show');
            document.getElementById('marketCard').classList.remove('hidden');
            document.getElementById('displayNickname').textContent = nickname;
            
            // Настраиваем кнопку в Telegram
            tg.MainButton.setText('Закрыть');
            tg.MainButton.onClick(() => tg.close());
            tg.MainButton.show();
        }
        
        // Проверяем, есть ли сохраненный никнейм
        window.onload = function() {
            const savedNickname = localStorage.getItem('userNickname');
            if (savedNickname) {
                document.getElementById('login').value = savedNickname;
            }
            
            // Если пользователь уже залогинен (можно проверить через бота)
            // Но пока просто оставляем на экране регистрации
        };
        
        // Обработка нажатия Enter
        document.getElementById('login').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleAuth();
            }
        });
        
        // Получаем информацию о пользователе
        const user = tg.initDataUnsafe?.user;
        if (user?.first_name) {
            const loginInput = document.getElementById('login');
            if (!loginInput.value) {
                loginInput.placeholder = user.first_name;
            }
        }
        
        console.log('✅ Web App загружен');
    </script>
</body>
</html>
