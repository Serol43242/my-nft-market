<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitTon NFT Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2f 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: rgba(30, 35, 50, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8899bb;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #aabbdd;
            font-size: 13px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(20, 25, 40, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #0088cc;
            background: rgba(30, 35, 50, 0.9);
        }
        input::placeholder {
            color: #556677;
        }
        .random-nick {
            font-size: 12px;
            color: #0088cc;
            margin-top: 5px;
            cursor: pointer;
            display: inline-block;
        }
        .random-nick:hover {
            text-decoration: underline;
        }
        .password-requirements {
            font-size: 12px;
            color: #8899bb;
            margin-top: 6px;
            padding-left: 10px;
        }
        .password-requirements span {
            display: inline-block;
            margin-right: 15px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0088cc, #00aaff);
            border: none;
            border-radius: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
            margin: 20px 0 12px 0;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            margin-top: 25px;
        }
        .feature {
            padding: 12px 5px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            font-size: 12px;
            color: #99aacc;
        }
        .feature span {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
        .warning {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.2);
            border-radius: 12px;
            color: #ffaaaa;
            font-size: 13px;
            text-align: center;
            display: none;
        }
        .warning.show {
            display: block;
        }
        .success-message {
            text-align: center;
            padding: 30px 20px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .checkmark {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #00cc88;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: white;
            animation: scaleIn 0.5s ease;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
        .password-strength {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }
        .strength-weak {
            background: #ff5555;
            width: 33%;
        }
        .strength-medium {
            background: #ffaa00;
            width: 66%;
        }
        .strength-strong {
            background: #00cc88;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Карточка регистрации -->
        <div class="card" id="registerCard">
            <div class="logo">
                <div class="logo-icon">🎨</div>
                <h1>OrbitTon</h1>
                <div class="subtitle">Создай аккаунт в NFT маркете</div>
            </div>
            
            <div class="input-group">
                <label>👤 Никнейм</label>
                <input type="text" id="login" placeholder="Введи никнейм" maxlength="20" autocomplete="off">
                <div class="random-nick" onclick="generateRandomNick()">🎲 Случайный ник</div>
            </div>
            
            <div class="input-group">
                <label>🔐 Пароль</label>
                <input type="password" id="password" placeholder="••••••••" maxlength="30" oninput="checkPasswordStrength()">
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
            </div>
            
            <div class="input-group">
                <label>✓ Подтвердите пароль</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" maxlength="30">
            </div>
            
            <div class="password-requirements">
                <span id="reqLength">🔴 минимум 6 символов</span>
                <span id="reqMatch">🔴 пароли совпадают</span>
            </div>
            
            <button class="btn-primary" id="registerBtn" onclick="handleAuth()">
                📝 Зарегистрироваться
            </button>
            
            <div class="features">
                <div class="feature"><span>🛡️</span>Безопасно</div>
                <div class="feature"><span>⚡</span>Мгновенно</div>
                <div class="feature"><span>💎</span>NFT</div>
            </div>
            
            <div class="warning" id="warning"></div>
        </div>
        
        <!-- Карточка успеха -->
        <div class="card success-message" id="successCard">
            <div class="checkmark">✓</div>
            <div class="success-text">Успешно!</div>
            <div class="success-subtext" id="successText">Аккаунт создан</div>
            <div style="margin-top: 20px; color: #8899bb; font-size: 14px;">
                <span class="loading"></span> Перенаправляем в маркет...
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0a0f1e');
        tg.setBackgroundColor('#0a0f1e');

        let currentUser = {
            nickname: '',
            id: tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 1000000)
        };

        function generateRandomNick() {
            const prefixes = ['Crypto', 'NFT', 'Meta', 'Cyber', 'Digital', 'Pixel', 'Block', 'Token'];
            const suffixes = ['King', 'Queen', 'Lord', 'Master', 'Guru', 'Hunter', 'Whale', 'Diamond'];
            const numbers = ['123', '777', '000', '420', '69'];
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
            const number = numbers[Math.floor(Math.random() * numbers.length)];
            let nick = prefix + suffix;
            if (Math.random() > 0.5) nick += number;
            document.getElementById('login').value = nick;
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');
            strengthBar.className = 'password-strength-bar';
            if (password.length === 0) {
                strengthBar.style.width = '0';
                return;
            }
            if (password.length < 4) strengthBar.classList.add('strength-weak');
            else if (password.length < 8) strengthBar.classList.add('strength-medium');
            else strengthBar.classList.add('strength-strong');
            updateRequirements();
        }

        function updateRequirements() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const reqLength = document.getElementById('reqLength');
            const reqMatch = document.getElementById('reqMatch');
            
            if (password.length >= 6) {
                reqLength.innerHTML = '✅ минимум 6 символов';
                reqLength.style.color = '#00cc88';
            } else {
                reqLength.innerHTML = '🔴 минимум 6 символов';
                reqLength.style.color = '#ffaaaa';
            }
            
            if (confirm.length > 0 && password === confirm) {
                reqMatch.innerHTML = '✅ пароли совпадают';
                reqMatch.style.color = '#00cc88';
            } else if (confirm.length > 0) {
                reqMatch.innerHTML = '🔴 пароли совпадают';
                reqMatch.style.color = '#ffaaaa';
            } else {
                reqMatch.innerHTML = '⚪ пароли совпадают';
                reqMatch.style.color = '#8899bb';
            }
        }

        function showWarning(message) {
            const warning = document.getElementById('warning');
            warning.textContent = message;
            warning.classList.add('show');
            setTimeout(() => warning.classList.remove('show'), 3000);
        }

        function handleAuth() {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            
            if (login.length < 3) {
                showWarning('⚠️ Никнейм должен содержать минимум 3 символа');
                return;
            }
            if (password.length < 6) {
                showWarning('⚠️ Пароль должен быть минимум 6 символов');
                return;
            }
            if (password !== confirm) {
                showWarning('⚠️ Пароли не совпадают');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading"></span> Создаем аккаунт...';
            
            if (!tg.sendData) {
                showWarning('❌ Открой приложение через кнопку в чате!');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '📝 Зарегистрироваться';
                return;
            }
            
            const userData = {
                nickname: login,
                action: 'register',
                user_id: tg.initDataUnsafe?.user?.id || 0,
                timestamp: Date.now()
            };
            
            try {
                tg.sendData(JSON.stringify(userData));
                
                document.getElementById('registerCard').style.display = 'none';
                document.getElementById('successCard').classList.add('show');
                document.getElementById('successText').innerHTML = `Аккаунт <b>${login}</b> создан!`;
                
                localStorage.setItem('userNickname', login);
                currentUser.nickname = login;
                
                setTimeout(() => {
                    if (window.Telegram.WebApp.isExpanded) {
                        tg.close(); // или можно перенаправить на другой URL, но для простоты закроем
                    }
                }, 2000);
                
            } catch (error) {
                showWarning('❌ Ошибка отправки: ' + error.message);
                registerBtn.disabled = false;
                registerBtn.innerHTML = '📝 Зарегистрироваться';
            }
        }

        window.onload = function() {
            const savedNickname = localStorage.getItem('userNickname');
            if (savedNickname) {
                document.getElementById('login').value = savedNickname;
            } else {
                document.getElementById('login').value = '';
            }
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
        };

        document.getElementById('password').addEventListener('input', updateRequirements);
        document.getElementById('confirmPassword').addEventListener('input', updateRequirements);
    </script>
</body>
</html>
