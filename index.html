<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrbitTon Registration</title>
    
    <!-- Правильный скрипт Telegram -->
    <script src="https://telegram.org"></script>
    
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 24px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 { 
            margin-bottom: 20px;
            background: linear-gradient(45deg, #0088cc, #00eeff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        input:focus { border-color: #0088cc; }

        .btn-reg {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-reg:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="card">
        <h2>OrbitTon</h2>
        <p style="color: #888; font-size: 13px;">Создание нового аккаунта</p>
        
        <input type="text" id="login" placeholder="Придумайте логин">
        <input type="password" id="pass1" placeholder="Пароль">
        <input type="password" id="pass2" placeholder="Повторите пароль">
        
        <button class="btn-reg" onclick="handleAuth()">Зарегистрироваться</button>
    </div>

<!-- Исправленный путь к скрипту -->
<script src="https://telegram.org"></script>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function handleAuth() {
        const login = document.getElementById("login").value.trim();
        const p1 = document.getElementById("pass1").value;
        const p2 = document.getElementById("pass2").value;

        if (login.length < 3) {
            tg.showPopup({ message: "Логин слишком короткий!" });
            return;
        }
        if (p1 !== p2) {
            tg.showPopup({ message: "Пароли не совпадают!" });
            return;
        }

        const data = JSON.stringify({ 
            nickname: login,
            status: "registered" 
        });

        // sendData работает ТОЛЬКО если Mini App открыт через KeyboardButton
        if (tg.sendData) {
            tg.sendData(data);
        } else {
            alert("Используйте кнопку 'Открыть Market 🚀' в меню бота");
        }
    }
</script>

</body>
</html>
