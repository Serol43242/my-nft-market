<body>
    <!-- Вся разметка без изменений (как в предыдущем большом коде) -->

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0a0f1e');
        tg.setBackgroundColor('#0a0f1e');

        // Данные пользователя, nftDatabase, фильтры и все функции остаются без изменений
        // ...

        // ЕДИНСТВЕННОЕ ИЗМЕНЕНИЕ: в window.onload убираем generateRandomNick()
        window.onload = function() {
            const savedNickname = localStorage.getItem('userNickname');
            if (savedNickname) {
                document.getElementById('login').value = savedNickname;
            } else {
                document.getElementById('login').value = ''; // поле пустое
            }
            
            document.getElementById('password').value = '';
            document.getElementById('confirmPassword').value = '';
            
            loadUserData();
            renderNFTs();
            updateBalances();
            updateProfile();
            updateMyNFTs();
            checkUrlParams();
        };

        // Все остальные функции (generateRandomNick, handleAuth и т.д.) остаются как есть
        // ...
    </script>
